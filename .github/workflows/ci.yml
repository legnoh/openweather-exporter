name: ci

on:
  push:
    branches:
    - main
    paths-ignore:
    - ".github/**"
  pull_request:
  workflow_dispatch:

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: true
      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: ">1.0"
          check-latest: true
      - name: Install dependencies
        run: |
          cd openweather-exporter
          go mod vendor
          cd -
      - name: Run GoReleaser Build
        uses: goreleaser/goreleaser-action@v2
        with:
          distribution: goreleaser
          version: latest
          args: build --snapshot
