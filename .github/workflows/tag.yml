name: tag

on:
  push:
    branches:
    - main
    paths:
    - "openweather-exporter"
  workflow_dispatch:

jobs:
  tagging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: true
      - name: Check Tag version
        run:
          echo "main_tag=\"$(git describe --tags)\"" >> $GITHUB_ENV
      - name: Check Submodule Tag version
        run:
          cd openweather-exporter
          echo "submodule_tag=\"$(git describe --tags)\"" >> $GITHUB_ENV
          cd -
      - name: Tagging
        if: ${{ startsWith( main_tag, submodule_tag ) == false }}
        uses: anothrNick/github-tag-action@1.36.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CUSTOM_TAG: ${{ submodule_tag }}
